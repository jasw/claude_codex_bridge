<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <marker id="arrowAsk" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#1d6f9f"/>
    </marker>
    <marker id="arrowScript" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#9a5a00"/>
    </marker>
    <marker id="arrowTopo" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#3f7d3a"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "WenQuanYi Zen Hei", sans-serif; fill: #16212b; }
      .title { font-size: 58px; font-weight: 800; }
      .subtitle { font-size: 28px; fill: #51606f; }
      .lane-title { font-size: 28px; font-weight: 700; fill: #1d2a35; }
      .box-title { font-size: 25px; font-weight: 700; }
      .box-sub { font-size: 20px; fill: #4e5c67; }
      .small { font-size: 18px; fill: #52606c; }
      .legend { font-size: 19px; fill: #2b3742; }
      .lane-agent { fill: #eef7fb; stroke: #b6d9e8; stroke-width: 2; }
      .lane-script { fill: #fff7e8; stroke: #ead0a4; stroke-width: 2; }
      .lane-state { fill: #f3f7ef; stroke: #cbdcbc; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #bdc8d2; stroke-width: 2; rx: 16; }
      .agent-card { stroke: #6eacc7; }
      .script-card { stroke: #d59d41; }
      .state-card { stroke: #87aa76; }
      .boundary { fill: #ffffff; stroke-width: 2; rx: 12; }
      .ask { stroke: #1d6f9f; stroke-width: 4; fill: none; marker-end: url(#arrowAsk); }
      .script { stroke: #9a5a00; stroke-width: 4; fill: none; marker-end: url(#arrowScript); }
      .topo { stroke: #3f7d3a; stroke-width: 4; fill: none; marker-end: url(#arrowTopo); }
      .dash { stroke-dasharray: 12 10; }
      .label { font-size: 17px; font-weight: 700; }
      .label-bg { fill: #ffffff; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#fbfcfd"/>
  <text x="80" y="82" class="title">Satinoös</text>
  <text x="80" y="124" class="subtitle">分层结构 + 信息流：Agent 做语义工作，脚本提交权威状态，文档保存可恢复事实</text>

  <rect x="70" y="170" width="1660" height="260" class="lane-agent" rx="22"/>
  <rect x="70" y="455" width="1660" height="235" class="lane-script" rx="22"/>
  <rect x="70" y="715" width="1660" height="270" class="lane-state" rx="22"/>

  <text x="100" y="210" class="lane-title">语义 Agent 层</text>
  <text x="100" y="495" class="lane-title">脚本 / 提交层</text>
  <text x="100" y="755" class="lane-title">状态 / 文档层</text>

  <!-- Agent lane -->
  <rect x="135" y="250" width="170" height="96" class="card agent-card"/>
  <text x="168" y="288" class="box-title">frontdesk</text>
  <text x="166" y="319" class="box-sub">用户边界</text>

  <rect x="355" y="250" width="170" height="96" class="card agent-card"/>
  <text x="400" y="288" class="box-title">planner</text>
  <text x="385" y="319" class="box-sub">宏观计划</text>

  <rect x="805" y="250" width="190" height="96" class="card agent-card"/>
  <text x="842" y="288" class="box-title">orchestrator</text>
  <text x="839" y="319" class="box-sub">四路分流</text>

  <rect x="1038" y="198" width="210" height="92" class="card agent-card"/>
  <text x="1075" y="234" class="box-title">task_detailer</text>
  <text x="1086" y="264" class="box-sub">按需细化</text>

  <rect x="1050" y="325" width="185" height="86" class="card agent-card"/>
  <text x="1092" y="358" class="box-title">planner</text>
  <text x="1087" y="387" class="box-sub">宏观调整</text>

  <rect x="1300" y="250" width="170" height="96" class="card agent-card"/>
  <text x="1340" y="288" class="box-title">coder</text>
  <text x="1338" y="319" class="box-sub">执行</text>

  <rect x="1500" y="250" width="190" height="96" class="card agent-card"/>
  <text x="1527" y="288" class="box-title">code_reviewer</text>
  <text x="1548" y="319" class="box-sub">审查</text>

  <rect x="1300" y="365" width="190" height="54" class="card agent-card"/>
  <text x="1325" y="399" class="box-sub">round_reviewer 验证</text>

  <!-- Script lane -->
  <rect x="360" y="535" width="220" height="84" class="card script-card"/>
  <text x="402" y="568" class="box-title">ccb plan</text>
  <text x="394" y="598" class="box-sub">artifact import</text>

  <rect x="785" y="535" width="220" height="84" class="card script-card"/>
  <text x="833" y="568" class="box-title">loop runner</text>
  <text x="842" y="598" class="box-sub">读取状态推进</text>

  <rect x="1080" y="535" width="270" height="84" class="card script-card"/>
  <text x="1120" y="568" class="box-title">ccb loop topology</text>
  <text x="1110" y="598" class="box-sub">apply / reconcile / release</text>

  <rect x="1445" y="535" width="230" height="84" class="card script-card"/>
  <text x="1485" y="568" class="box-title">round import</text>
  <text x="1488" y="598" class="box-sub">提交结果状态</text>

  <!-- State lane -->
  <rect x="315" y="805" width="190" height="86" class="card state-card"/>
  <text x="342" y="839" class="box-title">task_packet</text>
  <text x="355" y="868" class="box-sub">目标 / 范围</text>

  <rect x="545" y="805" width="220" height="86" class="card state-card"/>
  <text x="565" y="839" class="box-title">execution_contract</text>
  <text x="593" y="868" class="box-sub">验收 / 约束</text>

  <rect x="820" y="805" width="220" height="86" class="card state-card"/>
  <text x="850" y="839" class="box-title">orchestration_notes</text>
  <text x="873" y="868" class="box-sub">路由说明</text>

  <rect x="1085" y="805" width="250" height="86" class="card state-card"/>
  <text x="1112" y="839" class="box-title">agent_mount_topology</text>
  <text x="1135" y="868" class="box-sub">mount / pane / lifecycle</text>

  <rect x="1410" y="805" width="210" height="86" class="card state-card"/>
  <text x="1440" y="839" class="box-title">round_summary</text>
  <text x="1455" y="868" class="box-sub">稳定结果</text>

  <rect x="1395" y="910" width="250" height="50" class="card state-card"/>
  <text x="1431" y="942" class="box-sub">planner import / brief</text>

  <!-- Main ask flow -->
  <path class="ask" d="M305 298 C325 298,335 298,355 298"/>
  <path class="script" d="M525 298 C585 315,645 390,690 535"/>
  <path class="script" d="M470 619 C445 670,420 735,410 805"/>
  <path class="script" d="M555 619 C590 674,630 736,655 805"/>
  <path class="script" d="M765 848 C790 785,830 690,872 619"/>
  <path class="ask" d="M1000 298 C1060 298,1190 298,1300 298"/>
  <path class="ask" d="M1470 298 C1484 298,1488 298,1500 298"/>
  <path class="ask dash" d="M1500 330 C1440 360,1365 360,1320 330"/>
  <path class="script" d="M1595 346 C1580 420,1565 485,1560 535"/>
  <path class="script" d="M1560 619 C1548 690,1530 748,1515 805"/>
  <path class="script" d="M1515 891 C1517 900,1518 904,1520 910"/>

  <!-- Optional/detail/branch flows -->
  <path class="ask dash" d="M995 270 C1018 258,1022 248,1038 244"/>
  <path class="ask dash" d="M1143 290 C1095 304,1038 315,995 315"/>
  <path class="script dash" d="M995 338 C1028 352,1040 365,1050 368"/>
  <path class="script dash" d="M1135 411 C1110 482,1025 524,1005 548"/>

  <!-- Topology flow -->
  <path class="topo" d="M995 315 C1050 370,1140 455,1195 535"/>
  <path class="topo" d="M1215 619 C1212 690,1210 745,1210 805"/>
  <path class="topo" d="M1335 576 C1400 545,1485 475,1518 346"/>

  <!-- State/report flow back -->
  <path class="script dash" d="M1395 935 C1050 1005,610 980,440 346"/>
  <path class="ask dash" d="M1395 935 C900 1035,250 970,220 346"/>

  <!-- Labels -->
  <rect x="312" y="270" width="62" height="28" class="label-bg" stroke="#1d6f9f"/>
  <text x="324" y="290" class="label" fill="#1d6f9f">ASK</text>
  <rect x="624" y="438" width="82" height="28" class="label-bg" stroke="#9a5a00"/>
  <text x="638" y="459" class="label" fill="#9a5a00">SCRIPT</text>
  <rect x="1040" y="394" width="104" height="28" class="label-bg" stroke="#3f7d3a"/>
  <text x="1052" y="415" class="label" fill="#3f7d3a">TOPOLOGY</text>
  <rect x="1082" y="172" width="104" height="26" class="label-bg" stroke="#1d6f9f"/>
  <text x="1091" y="192" class="small">needs_detail</text>
  <rect x="1048" y="421" width="148" height="26" class="label-bg" stroke="#9a5a00"/>
  <text x="1058" y="441" class="small">macro_adjustment</text>
  <rect x="1018" y="346" width="86" height="26" class="label-bg" stroke="#9a5a00"/>
  <text x="1031" y="366" class="small">blocked</text>

  <!-- Legend -->
  <rect x="80" y="1015" width="1640" height="72" fill="#ffffff" stroke="#d3dbe2" stroke-width="2" rx="18"/>
  <line x1="120" y1="1050" x2="190" y2="1050" class="ask"/>
  <text x="210" y="1056" class="legend">ASK：只贴在 Agent 间协作箭头上</text>
  <line x1="520" y1="1050" x2="590" y2="1050" class="script"/>
  <text x="610" y="1056" class="legend">SCRIPT：只贴在状态提交 / artifact 导入箭头上</text>
  <line x1="1060" y1="1050" x2="1130" y2="1050" class="topo"/>
  <text x="1150" y="1056" class="legend">TOPOLOGY：只贴在 mount、window、pane、lifecycle 操作上</text>
</svg>

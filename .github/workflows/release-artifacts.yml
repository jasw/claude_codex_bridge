name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload"
        required: true
        default: "v8.1.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} release artifact
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            script: scripts/build_linux_release.py
            artifact: ccb-linux-x86_64.tar.gz
          - platform: macos
            os: macos-latest
            script: scripts/build_macos_release.py
            artifact: ccb-macos-universal.tar.gz

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build release artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist-release
          python "${{ matrix.script }}" --output-dir dist-release --git-ref HEAD
          test -f "dist-release/${{ matrix.artifact }}"
          tar -tzf "dist-release/${{ matrix.artifact }}" | grep -F BUILD_INFO.json
          tar -tzf "dist-release/${{ matrix.artifact }}" | grep -F assets/weixin.jpg

      - name: Verify Rust helpers
        shell: bash
        run: |
          set -euo pipefail
          verify_dir="$(mktemp -d)"
          tar -xzf "dist-release/${{ matrix.artifact }}" -C "$verify_dir"
          if [ "${{ matrix.platform }}" = "macos" ]; then
            helper="$verify_dir/ccb-macos-universal/bin/ccb-agent-sidebar"
            rs_helper="$verify_dir/ccb-macos-universal/bin/ccb-rs-helper"
            accelerator="$verify_dir/ccb-macos-universal/bin/ccb-runtime-accelerator"
            file "$helper" | tee "$verify_dir/sidebar-file.txt"
            file "$rs_helper" | tee "$verify_dir/rs-helper-file.txt"
            file "$accelerator" | tee "$verify_dir/runtime-accelerator-file.txt"
            grep -F 'universal binary' "$verify_dir/sidebar-file.txt"
            grep -F 'universal binary' "$verify_dir/rs-helper-file.txt"
            grep -F 'universal binary' "$verify_dir/runtime-accelerator-file.txt"
          else
            helper="$verify_dir/ccb-linux-x86_64/bin/ccb-agent-sidebar"
            rs_helper="$verify_dir/ccb-linux-x86_64/bin/ccb-rs-helper"
            accelerator="$verify_dir/ccb-linux-x86_64/bin/ccb-runtime-accelerator"
          fi
          set +e
          "$helper" --help >/tmp/ccb-sidebar-help.out 2>/tmp/ccb-sidebar-help.err
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            cat /tmp/ccb-sidebar-help.out
            cat /tmp/ccb-sidebar-help.err >&2
            exit "$rc"
          fi
          "$rs_helper" --capabilities | grep -F 'native.output.observe'
          accelerator_socket="$("$accelerator" socket-path --project-root "$verify_dir")"
          case "$accelerator_socket" in
            */.ccb/runtime-accelerator/accelerator.sock|*/ccb-runtime/accelerator-*.sock)
              ;;
            *)
              echo "Unexpected runtime accelerator socket path: $accelerator_socket" >&2
              exit 1
              ;;
          esac

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-release/${{ matrix.artifact }}
          if-no-files-found: error

  mobile-android:
    name: Build Android mobile APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          cache: true

      - name: Prepare Android release signing
        shell: bash
        env:
          CCB_MOBILE_RELEASE_KEYSTORE_B64: ${{ secrets.CCB_MOBILE_RELEASE_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${CCB_MOBILE_RELEASE_KEYSTORE_B64}" ]; then
            echo "CCB_MOBILE_RELEASE_KEYSTORE_B64 secret is required for signed Android release builds." >&2
            exit 1
          fi
          printf '%s' "${CCB_MOBILE_RELEASE_KEYSTORE_B64}" | base64 -d > "$RUNNER_TEMP/ccb-mobile-release.jks"

      - name: Build Android APK
        shell: bash
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
          CCB_MOBILE_RELEASE_STORE_FILE: ${{ runner.temp }}/ccb-mobile-release.jks
          CCB_MOBILE_RELEASE_STORE_PASSWORD: ${{ secrets.CCB_MOBILE_RELEASE_STORE_PASSWORD }}
          CCB_MOBILE_RELEASE_KEY_ALIAS: ${{ secrets.CCB_MOBILE_RELEASE_KEY_ALIAS }}
          CCB_MOBILE_RELEASE_KEY_PASSWORD: ${{ secrets.CCB_MOBILE_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          test "$(tr -d '[:space:]' < VERSION)" = "$version"
          app_version="$(python - <<'PY'
          from pathlib import Path
          for line in Path("mobile/app/pubspec.yaml").read_text(encoding="utf-8").splitlines():
              if line.startswith("version:"):
                  print(line.split(":", 1)[1].strip())
                  break
          PY
          )"
          test "${app_version%%+*}" = "$version"
          cd mobile/app
          flutter pub get
          flutter build apk --release
          cd ../..
          mkdir -p dist-release
          apk_asset="ccb-mobile-${TAG_NAME}.apk"
          cp mobile/app/build/app/outputs/flutter-apk/app-release.apk "dist-release/${apk_asset}"
          python - "$TAG_NAME" "$apk_asset" > "dist-release/ccb-mobile-${TAG_NAME}.json" <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import sys

          tag_name, apk_asset = sys.argv[1:3]
          version = tag_name.removeprefix("v")
          apk_path = Path("dist-release") / apk_asset
          digest = hashlib.sha256(apk_path.read_bytes()).hexdigest()
          pubspec_version = None
          for line in Path("mobile/app/pubspec.yaml").read_text(encoding="utf-8").splitlines():
              if line.startswith("version:"):
                  pubspec_version = line.split(":", 1)[1].strip()
                  break
          if not pubspec_version:
              raise SystemExit("mobile app version missing")
          version_name, version_code = pubspec_version.split("+", 1)
          manifest = {
              "schema_version": 1,
              "version": version,
              "android": {
                  "asset_name": apk_asset,
                  "application_id": "io.ccb.mobile.ccb_mobile",
                  "label": "CCB Mobile",
                  "version_code": int(version_code),
                  "version_name": version_name,
                  "min_sdk": 24,
                  "target_sdk": 36,
                  "download_url": f"https://github.com/SeemSeam/claude_codex_bridge/releases/download/{tag_name}/{apk_asset}",
                  "sha256": digest,
                  "size_bytes": apk_path.stat().st_size,
              },
              "setup": {
                  "desktop_command": "ccb update mobile",
                  "route_provider": "tailnet",
                  "gateway_binding": "loopback-only",
                  "tailscale_funnel": False,
              },
          }
          print(json.dumps(manifest, indent=2, sort_keys=False))
          PY

      - name: Upload mobile workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ccb-mobile-android
          path: |
            dist-release/ccb-mobile-${{ github.event.inputs.tag || github.ref_name }}.apk
            dist-release/ccb-mobile-${{ github.event.inputs.tag || github.ref_name }}.json
          if-no-files-found: error

  publish:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs:
      - build
      - mobile-android

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Verify and publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          cd dist-release
          test -f ccb-linux-x86_64.tar.gz
          test -f ccb-macos-universal.tar.gz
          test -f "ccb-mobile-${TAG_NAME}.apk"
          test -f "ccb-mobile-${TAG_NAME}.json"
          sha256sum ccb-*.tar.gz ccb-mobile-*.apk ccb-mobile-*.json | sort -k2 > SHA256SUMS
          sha256sum -c SHA256SUMS
          notes_file="$(mktemp)"
          python - "$TAG_NAME" > "$notes_file" <<'PY'
          from pathlib import Path
          import os
          import sys

          tag = sys.argv[1]
          changelog = Path(os.environ["GITHUB_WORKSPACE"]) / "CHANGELOG.md"
          lines = changelog.read_text(encoding="utf-8").splitlines()
          capture = False
          body: list[str] = []
          for line in lines:
              if line.startswith(f"## {tag}"):
                  capture = True
                  continue
              if capture and line.startswith("## "):
                  break
              if capture:
                  body.append(line)
          text = "\n".join(body).strip()
          if not text:
              raise SystemExit(f"release notes missing for {tag}")
          print(text)
          PY
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes-file "$notes_file"
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes-file "$notes_file"
          fi
          gh release upload "$TAG_NAME" ccb-linux-x86_64.tar.gz ccb-macos-universal.tar.gz "ccb-mobile-${TAG_NAME}.apk" "ccb-mobile-${TAG_NAME}.json" SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest tomli

      - name: Install tmux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          else
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Syntax check
        run: python -m compileall -q lib bin ccb.py

      - name: Run tests
        run: pytest test/ -v --tb=short -m "not provider_blackbox"
        shell: bash

      - name: Guard dynamic layout provider matrix smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-dynamic-layout-provider-matrix-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/guarded_dynamic_layout_provider_smoke.py \
            --test-root "$smoke_root" \
            --project-prefix ci-guarded-dynamic-layout \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --reset \
            --json | tee "$RUNNER_TEMP/guarded-dynamic-layout-provider-smoke.json"
          python - "$RUNNER_TEMP/guarded-dynamic-layout-provider-smoke.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert payload["dynamic_layout_smoke_status"] == "prepared"
          assert payload["providers"] == ["codex", "claude"]
          assert payload["flows"] == ["window-class", "move-agent", "resolve-preflight"]
          PY

      - name: Guard same-window continuous dynamic layout smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-same-window-continuous-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/dynamic_layout_smoke.py \
            --test-root "$smoke_root" \
            --project-prefix ci-same-window-continuous \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --provider fake \
            --flow same-window-continuous \
            --flow batch-release \
            --flow move-agent \
            --flow move-shared-source \
            --flow window-class-continuous \
            --flow arrange-window \
            --command-timeout 180 \
            --reset > "$RUNNER_TEMP/same-window-continuous-smoke.json"
          python - "$RUNNER_TEMP/same-window-continuous-smoke.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert payload["dynamic_layout_smoke_status"] == "ok"
          assert payload["flows"] == ["same-window-continuous", "batch-release", "move-agent", "move-shared-source", "window-class-continuous", "arrange-window"]
          assert payload["checks"]["same_window_continuous_1_to_6_to_1"] is True
          assert payload["checks"]["batch_release_multi_window"] is True
          assert payload["checks"]["move_agent_to_new_window"] is True
          assert payload["checks"]["move_agent_shared_source"] is True
          assert payload["checks"]["window_class_continuous_1_to_8_to_1"] is True
          assert payload["checks"]["arrange_window_disturb_restore"] is True
          results = {item["flow"]: item for item in payload["results"]}
          result = results["same_window_continuous_1_to_6_to_1"]
          checks = result["checks"]
          assert result["flow"] == "same_window_continuous_1_to_6_to_1"
          assert checks["grew_to_six_order"] is True
          assert checks["observed_grew_to_six_panes"] is True
          assert checks["observed_grow_geometry"] is True
          assert checks["observed_grow_indexes_contiguous"] is True
          assert checks["observed_grow_min_width"] is True
          assert checks["observed_grow_fixed_columns"] is True
          assert checks["release_remove_agent_plans"] is True
          assert checks["release_reflowed_main"] is True
          assert checks["main_pane_preserved"] is True
          assert checks["shrunk_to_one_order"] is True
          assert checks["observed_shrunk_to_one_pane"] is True
          assert checks["observed_shrink_geometry"] is True
          assert checks["dynamic_agents_cleaned"] is True
          assert checks["ask_main_accepted"] is True
          move = results["move_agent_to_new_window"]["checks"]
          assert move["add_agent_plan"] is True
          assert move["pre_move_ask_accepted"] is True
          assert move["pre_move_ask_terminal"] is True
          assert move["move_plan_class"] is True
          assert move["move_preserved_helper_pane"] is True
          assert move["move_window_evidence"] is True
          assert move["post_move_ask_accepted"] is True
          assert move["post_move_ask_terminal"] is True
          assert move["return_preserved_helper_pane"] is True
          assert move["return_removed_review_window"] is True
          assert move["return_ask_accepted"] is True
          assert move["return_ask_terminal"] is True
          assert move["release_kept_main_window"] is True
          assert move["dynamic_agents_cleaned"] is True
          batch = results["batch_release_multi_window"]["checks"]
          assert batch["batch_remove_agent_plan"] is True
          assert batch["batch_removed_agents"] is True
          assert batch["batch_removed_agent_panes_match"] is True
          assert batch["batch_removed_windows"] is True
          assert batch["survivor_panes_preserved"] is True
          assert batch["after_windows"] is True
          assert batch["survivor_ask_accepted"] is True
          assert batch["main_ask_accepted"] is True
          window_class = results["window_class_continuous_1_to_8_to_1"]["checks"]
          assert window_class["add_plan_sequence"] is True
          assert window_class["page1_order"] is True
          assert window_class["page2_order"] is True
          assert window_class["page1_observed_fixed_columns"] is True
          assert window_class["page2_observed_fixed_columns"] is True
          assert window_class["helper7_ask_accepted"] is True
          assert window_class["helper7_ask_terminal"] is True
          assert window_class["release_remove_agent_plans"] is True
          assert window_class["page2_removed_when_empty"] is True
          assert window_class["after_page2_removed"] is True
          assert window_class["dynamic_agents_cleaned"] is True
          arrange = results["arrange_window_disturb_restore"]["checks"]
          assert arrange["disturb_made_non_fixed"] is True
          assert arrange["arrange_status_ok"] is True
          assert arrange["arrange_reflowed_plan"] is True
          assert arrange["arrange_fixed_columns"] is True
          assert arrange["pane_ids_preserved"] is True
          assert arrange["helper_ask_accepted"] is True
          assert arrange["helper_ask_terminal"] is True
          assert arrange["dynamic_agents_cleaned"] is True
          print(
              json.dumps(
                  {
                      "dynamic_layout_smoke_status": payload["dynamic_layout_smoke_status"],
                      "flows": payload["flows"],
                      "same_window_checks": checks,
                      "move_checks": move,
                      "window_class_checks": window_class,
                      "arrange_checks": arrange,
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Guard dynamic agent lifecycle smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-dynamic-agent-lifecycle-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/dynamic_agent_lifecycle_smoke.py \
            --test-root "$smoke_root" \
            --project-name ci-dynamic-agent-lifecycle \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --provider fake \
            --command-timeout 180 \
            --reset > "$RUNNER_TEMP/dynamic-agent-lifecycle-smoke.json"
          python - "$RUNNER_TEMP/dynamic-agent-lifecycle-smoke.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          checks = payload["checks"]
          assert payload["dynamic_agent_lifecycle_smoke_status"] == "ok"
          assert checks["planner_auto_policy_park"] is True
          assert checks["planner_park_dispatch_disabled"] is True
          assert checks["planner_park_view_only"] is True
          assert checks["planner_pane_preserved_on_park"] is True
          assert checks["parked_ask_rejected"] is True
          assert checks["planner_resume_hidden"] is True
          assert checks["planner_pane_preserved_on_resume"] is True
          assert checks["planner_ask_after_resume_accepted"] is True
          assert checks["reviewer_auto_policy_unload"] is True
          assert checks["reviewer_remove_agent"] is True
          assert checks["reviewer_pane_removed"] is True
          assert checks["layout_clean_after_cleanup"] is True
          assert checks["asks_terminal"] is True
          print(
              json.dumps(
                  {
                      "dynamic_agent_lifecycle_smoke_status": payload["dynamic_agent_lifecycle_smoke_status"],
                      "provider": payload["provider"],
                      "selected_checks": {
                          "planner_auto_policy_park": checks["planner_auto_policy_park"],
                          "parked_ask_rejected": checks["parked_ask_rejected"],
                          "planner_resume_hidden": checks["planner_resume_hidden"],
                          "reviewer_auto_policy_unload": checks["reviewer_auto_policy_unload"],
                          "layout_clean_after_cleanup": checks["layout_clean_after_cleanup"],
                      },
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Guard reload busy drain smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-reload-busy-drain-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/reload_busy_drain_smoke.py \
            --test-root "$smoke_root" \
            --project-name ci-reload-busy-drain \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --provider fake \
            --command-timeout 180 \
            --busy-latency-ms 5000 \
            --reset > "$RUNNER_TEMP/reload-busy-drain-smoke.json"
          python - "$RUNNER_TEMP/reload-busy-drain-smoke.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          checks = payload["checks"]
          assert payload["reload_busy_drain_smoke_status"] == "ok"
          assert checks["busy_ask_accepted"] is True
          assert checks["blocked_reload_reports_active_drain"] is True
          assert checks["project_view_records_active_drain"] is True
          assert checks["new_ask_rejected_while_draining"] is True
          assert checks["busy_job_terminal"] is True
          assert checks["retry_reload_published"] is True
          assert checks["project_view_drain_cleared"] is True
          assert checks["agent2_removed_from_view"] is True
          print(
              json.dumps(
                  {
                      "reload_busy_drain_smoke_status": payload["reload_busy_drain_smoke_status"],
                      "provider": payload["provider"],
                      "selected_checks": {
                          "blocked_reload_reports_active_drain": checks["blocked_reload_reports_active_drain"],
                          "project_view_records_active_drain": checks["project_view_records_active_drain"],
                          "new_ask_rejected_while_draining": checks["new_ask_rejected_while_draining"],
                          "retry_reload_published": checks["retry_reload_published"],
                          "agent2_removed_from_view": checks["agent2_removed_from_view"],
                      },
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Guard workflow closure layout cleanup smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-workflow-closure-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/workflow_closure_smoke.py \
            --test-root "$smoke_root" \
            --project-name ci-workflow-closure \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --provider fake \
            --timeout 120 \
            --reset \
            --run \
            --json > "$RUNNER_TEMP/workflow-closure-smoke.json"
          python - "$RUNNER_TEMP/workflow-closure-smoke.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          run = payload["run"]
          summary = run["summary"]
          release = summary["release"]
          apply = release["apply"]
          assert run["workflow_smoke_status"] == "ok"
          assert summary["ok"] is True
          assert release["loop_capacity_status"] == "released"
          assert release["retained_count"] == 0
          assert not apply["namespace_reflow_errors"]
          assert not apply["pane_identity_report"]["reflow_errors"]
          print(
              json.dumps(
                  {
                      "workflow_smoke_status": run["workflow_smoke_status"],
                      "loop_id": summary["loop_id"],
                      "final_status": summary["final_status"],
                      "released_count": release["released_count"],
                      "reflowed_windows": apply["namespace_reflowed_windows"],
                  },
                  sort_keys=True,
              )
          )
          PY

      - name: Guard orchestrator autonomous cleanup contract
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          smoke_root="${RUNNER_TEMP}/ccb-orchestrator-autonomous-cleanup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python scripts/orchestrator_capacity_semantic_smoke.py \
            --test-root "$smoke_root" \
            --project-name ci-orchestrator-autonomous-cleanup \
            --ccb-test "$GITHUB_WORKSPACE/ccb_test" \
            --provider fake \
            --reset \
            --prepare-only \
            --json > "$RUNNER_TEMP/orchestrator-autonomous-cleanup-contract.json"
          python - "$RUNNER_TEMP/orchestrator-autonomous-cleanup-contract.json" "$GITHUB_WORKSPACE/ccb_test" <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          ccb_test = Path(sys.argv[2])
          prepare = payload["prepare"]
          preflight = payload["preflight"]
          contract = payload["autonomous_cleanup_contract"]
          assert preflight["preflight_status"] == "ok"
          assert contract["autonomous_cleanup_contract_status"] == "ok"
          assert contract["canonical_pass"] is True
          assert all(contract["rejections"].values())
          config = Path(prepare["config_path"]).read_text(encoding="utf-8")
          assert 'main = "orchestrator:fake"' in config
          assert '[loop.role_profiles.worker]' in config
          assert '[loop.role_profiles.code_reviewer]' in config
          env = os.environ.copy()
          env["HOME"] = prepare["source_home"]
          env["CCB_SOURCE_HOME"] = prepare["source_home"]
          env["AGENT_ROLES_STORE"] = prepare["role_store"]
          env["CCB_NO_ATTACH"] = "1"
          completed = subprocess.run(
              [str(ccb_test), "--project", prepare["project_root"], "config", "validate"],
              cwd=Path(prepare["project_root"]).parent,
              env=env,
              text=True,
              capture_output=True,
              timeout=60,
          )
          assert completed.returncode == 0, completed.stdout + completed.stderr
          assert "config_status: valid" in completed.stdout
          print(
              json.dumps(
                  {
                      "preflight_status": preflight["preflight_status"],
                      "contract_status": contract["autonomous_cleanup_contract_status"],
                      "project_root": prepare["project_root"],
                  },
                  sort_keys=True,
              )
          )
          PY

  provider-blackbox:
    name: Provider blackbox / ubuntu-latest / py3.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest tomli

      - name: Install tmux
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Syntax check
        run: python -m compileall -q lib bin ccb.py

      - name: Run provider blackbox tests
        shell: bash
        run: |
          set -euo pipefail
          export TERM=xterm-256color
          python -m pytest -q -m provider_blackbox test/test_v2_phase2_entrypoint.py

  rust-helpers:
    name: Rust helpers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run sidebar tests
        run: cargo test --manifest-path tools/ccb-agent-sidebar/Cargo.toml

      - name: Run ccb-rs-helper tests
        run: cargo test --manifest-path tools/ccb-rs-helper/Cargo.toml

      - name: Run runtime accelerator tests
        run: cargo test --manifest-path rust/Cargo.toml -p ccb-runtime-accelerator -- --test-threads=1

      - name: Build sidebar binary
        run: bin/build-ccb-agent-sidebar

      - name: Build ccb-rs-helper binary
        run: bin/build-ccb-rs-helper

      - name: Build runtime accelerator binary
        run: bin/build-ccb-runtime-accelerator

  macos-install-smoke:
    name: macOS install smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest tomli

      - name: Install tmux
        shell: bash
        run: brew install tmux

      - name: Run install and update focused tests
        run: |
          pytest -q \
            test/test_build_macos_release_script.py \
            test/test_install_identity_output.py \
            test/test_install_watchdog_optional.py \
            test/test_install_major_upgrade_guard.py \
            test/test_cli_management_update.py \
            test/test_cli_startup_update.py

      - name: Build macOS Rust helpers for release install smoke
        run: |
          bin/build-ccb-agent-sidebar
          bin/build-ccb-rs-helper

      - name: Smoke macOS release install
        shell: bash
        run: |
          set -euo pipefail

          platform="$(bash -lc 'source ./install.sh; detect_platform')"
          test "$platform" = "macos"

          tmux_hint="$(bash -lc 'source ./install.sh; print_tmux_install_hint')"
          printf '%s\n' "$tmux_hint"
          [[ "$tmux_hint" == *"macOS:"* ]]

          install_identity="$(
            CCB_LANG=en \
            CCB_SOURCE_KIND=release \
            CCB_BUILD_CHANNEL=stable \
            CCB_BUILD_VERSION=0.0.0-ci \
            bash -lc 'source ./install.sh; print_install_identity_summary; print_install_identity_notice'
          )"
          printf '%s\n' "$install_identity"
          [[ "$install_identity" == *"install_mode=release"* ]]
          [[ "$install_identity" == *"source_kind=release"* ]]
          [[ "$install_identity" == *"channel=stable"* ]]
          [[ "$install_identity" == *"version=0.0.0-ci"* ]]
          [[ "$install_identity" == *"Official release package install detected"* ]]

          smoke_root="$(mktemp -d)"
          mkdir -p "$smoke_root/home" "$smoke_root/bin"

          HOME="$smoke_root/home" \
          CODEX_INSTALL_PREFIX="$smoke_root/install" \
          CODEX_BIN_DIR="$smoke_root/bin" \
          CCB_LANG=en \
          CCB_SOURCE_KIND=release \
          CCB_BUILD_CHANNEL=stable \
          CCB_BUILD_VERSION='0.0.0-ci-"quoted"' \
          CCB_BUILD_TIME=2026-05-04T00:00:00Z \
          CCB_ALLOW_TEMP_INSTALL_GLOBAL_BIN=1 \
            bash -lc 'bash ./install.sh install'

          python - "$smoke_root/install/BUILD_INFO.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          assert payload["version"] == '0.0.0-ci-"quoted"'
          assert payload["install_mode"] == "release"
          PY

          test -d "$smoke_root/install/.venv"
          test -x "$smoke_root/install/bin/_ccb-python"
          "$smoke_root/install/bin/_ccb-python" --resolve >/dev/null
          grep -F "$smoke_root/install/bin/_ccb-python" "$smoke_root/bin/ccb"
          grep -F "$smoke_root/install/ccb.py" "$smoke_root/bin/ccb"
          grep -F "$smoke_root/install/bin/_ccb-python" "$smoke_root/bin/ask"
          grep -F "$smoke_root/install/bin/ask.py" "$smoke_root/bin/ask"
          grep -F "$smoke_root/install/bin/_ccb-python" "$smoke_root/bin/autonew"
          grep -F "$smoke_root/install/bin/autonew.py" "$smoke_root/bin/autonew"
          grep -F "$smoke_root/install/bin/_ccb-python" "$smoke_root/bin/ctx-transfer"
          grep -F "$smoke_root/install/bin/ctx-transfer.py" "$smoke_root/bin/ctx-transfer"
          test -x "$smoke_root/bin/ccb"
          test -x "$smoke_root/bin/ask"
          test -x "$smoke_root/bin/autonew"
          test -x "$smoke_root/bin/ctx-transfer"
          test -x "$smoke_root/bin/ccb-rs-helper"
          "$smoke_root/bin/ccb-rs-helper" --capabilities | grep -F 'native.output.observe'
          "$smoke_root/install/.venv/bin/python" -c 'import watchdog'

      - name: Smoke macOS release packaging
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist-macos-smoke
          python scripts/build_macos_release.py --allow-dirty --output-dir dist-macos-smoke
          test -f dist-macos-smoke/ccb-macos-universal.tar.gz
          test -f dist-macos-smoke/SHA256SUMS
          smoke_extract="$(mktemp -d)"
          tar -xzf dist-macos-smoke/ccb-macos-universal.tar.gz -C "$smoke_extract"
          helper="$smoke_extract/ccb-macos-universal/bin/ccb-agent-sidebar"
          rs_helper="$smoke_extract/ccb-macos-universal/bin/ccb-rs-helper"
          file "$helper" | tee "$smoke_extract/sidebar-file.txt"
          file "$rs_helper" | tee "$smoke_extract/rs-helper-file.txt"
          grep -F 'universal binary' "$smoke_extract/sidebar-file.txt"
          grep -F 'universal binary' "$smoke_extract/rs-helper-file.txt"
          "$helper" --help >/dev/null 2>&1 || test "$?" -eq 2
          "$rs_helper" --capabilities | grep -F 'native.output.observe'

  test-wsl:
    name: WSL / Ubuntu 22.04
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup WSL
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04

      - name: Install Python and dependencies in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common python3 python3-venv python3-pip tmux
          if ! apt-cache show python3.11 >/dev/null 2>&1; then
            sudo add-apt-repository -y ppa:deadsnakes/ppa
            sudo apt-get update
          fi
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev
          python3.11 -m venv /tmp/ccb-ci-py311
          /tmp/ccb-ci-py311/bin/python -m pip install --upgrade pip
          /tmp/ccb-ci-py311/bin/python -m pip install pytest tomli

      - name: Syntax check in WSL
        shell: wsl-bash {0}
        run: |
          /tmp/ccb-ci-py311/bin/python -m compileall -q lib bin ccb.py

      - name: Smoke ccb startup from /mnt/c in WSL
        shell: wsl-bash {0}
        run: |
          set -euo pipefail

          repo="$(pwd)"
          project="/mnt/c/Temp/ccb-wsl-mnt-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          export CCB_SOURCE_ALLOWED_ROOTS="$project"
          rm -rf "$project"
          mkdir -p "$project/.ccb"
          printf 'demo:fake\n' > "$project/.ccb/ccb.config"

          dump_diagnostics() {
            printf '%s\n' '--- start.out ---'
            cat "$project/start.out" 2>/dev/null || true
            printf '%s\n' '--- start.err ---'
            cat "$project/start.err" 2>/dev/null || true
            printf '%s\n' '--- ping.out ---'
            cat "$project/ping.out" 2>/dev/null || true
            printf '%s\n' '--- ping.err ---'
            cat "$project/ping.err" 2>/dev/null || true
            printf '%s\n' '--- doctor.out ---'
            cat "$project/doctor.out" 2>/dev/null || true
            printf '%s\n' '--- doctor.err ---'
            cat "$project/doctor.err" 2>/dev/null || true
            if [ -d "$project/.ccb/ccbd" ]; then
              printf '%s\n' '--- ccbd files ---'
              find "$project/.ccb/ccbd" -maxdepth 1 -type f -print | sort
              for file in "$project"/.ccb/ccbd/*.log "$project"/.ccb/ccbd/*.json; do
                [ -f "$file" ] || continue
                printf '%s\n' "--- $file ---"
                tail -200 "$file" || true
              done
            fi
          }

          cleanup() {
            (cd "$project" && "$repo/ccb" kill -f >/dev/null 2>&1) || true
            rm -rf "$project"
          }
          on_exit() {
            status="$?"
            if [ "$status" -ne 0 ]; then
              dump_diagnostics
            fi
            cleanup
            exit "$status"
          }
          trap on_exit EXIT

          if ! (
            cd "$project"
            CCB_NO_ATTACH=1 \
            CCB_STARTUP_TRANSACTION_TIMEOUT_S=60 \
            CCB_KEEPER_READY_TIMEOUT_S=10 \
            CCB_TMUX_OBJECT_READY_TIMEOUT_S=10 \
            TERM=xterm-256color \
            timeout 90s "$repo/ccb" >start.out 2>start.err
          ); then
            exit 1
          fi

          (cd "$project" && "$repo/ccb" ping ccbd >ping.out 2>ping.err)
          (cd "$project" && "$repo/ccb" doctor >doctor.out 2>doctor.err)

          grep -F 'start_status: ok' "$project/start.out"
          grep -F 'agents: demo' "$project/start.out"
          grep -F 'mount_state: mounted' "$project/ping.out"
          grep -F 'health: healthy' "$project/ping.out"
          grep -F 'runtime_root_kind: relocated' "$project/ping.out"
          grep -F 'runtime_relocation_reason: runtime_root_ref' "$project/ping.out"
          grep -F 'socket_root_kind: runtime' "$project/ping.out"
          grep -F 'tmux_socket_root_kind: runtime' "$project/ping.out"
          grep -F 'ccbd_runtime_root_kind: relocated' "$project/doctor.out"
          grep -F 'ccbd_runtime_relocation_reason: runtime_root_ref' "$project/doctor.out"
          grep -F 'ccbd_socket_root_kind: runtime' "$project/doctor.out"
          grep -F 'ccbd_tmux_socket_root_kind: runtime' "$project/doctor.out"

      - name: Run tests in WSL with tmux
        shell: wsl-bash {0}
        run: |
          export TERM=xterm-256color
          /tmp/ccb-ci-py311/bin/python -m pytest test/ -v --tb=short -m "not provider_blackbox"

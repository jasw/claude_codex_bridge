name: ccb_mobile
description: Native mobile controller for server-side CCB tmux projects.
publish_to: "none"
version: 8.0.19+8000019

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  xterm: ^4.0.0
  mobile_scanner: ^7.2.0
  flutter_markdown_plus: ^1.0.7
  file_picker:
    path: third_party/file_picker
  path_provider: ^2.1.6
  open_filex:
    path: third_party/open_filex
  mime: ^2.0.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  crypto: ^3.0.7
  lints: ">=4.0.0 <7.0.0"
  test: ^1.25.15

flutter:
  uses-material-design: true
